version: 2

sources:
  - name: flux_raw
    description: >
      Documents Enedis bruts landés par dlt — une ligne par fichier, contenu
      intégral préservé en colonne JSON (pas d'explosion). Cf. ADR-0020 :
      la linéarisation (sélection + pivot) vit dans les modèles dbt, pas en Python.
    schema: flux_raw
    tables:
      - name: raw_r64
        description: Flux R64 (relevés index JSON), un document par ligne.
        columns:
          - name: content
            description: Document JSON intégral (header + mesures).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_r67
        description: >
          Flux R67 (« mesures facturantes » : énergie facturante par période, à la
          demande M023, ADR-0047), un document JSON par ligne. Même plomberie de
          landing que R64, mais énergie déjà différenciée par période — jamais unioné
          dans les relevés index (releves/chronologie_releves).
        columns:
          - name: content
            description: Document JSON intégral (header + mesures).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt + dédup re-livraison).
      - name: raw_c15
        description: >
          Flux C15 (situation contractuelle), un document par ligne. Le XML est
          converti en dict par `etl/parsing/xml.xml_vers_dict` (politique
          « conteneur = liste ») avant landing — d'où des tableaux JSON même pour
          les éléments uniques (PRM, Evenement_Declencheur…), indexés `[0]` en SQL.
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + Contrat + PRM[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_r15
        description: >
          Flux R15 (relevés + événements), un document XML→dict par ligne. Source
          partagée par flux_r15 (index distributeur) et flux_r15_acc (énergies ACC).
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + PRM[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_r151
        description: Flux R151 (index périodiques), un document XML→dict par ligne.
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + PRM[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_f12
        description: Flux F12 (facturation distributeur), un document XML→dict par ligne.
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + Rappel_En_Tete + Sous_Lot[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_f15
        description: Flux F15 (factures détaillées), un document XML→dict par ligne.
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + Rappel_En_Tete + Donnees_Valorisation[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_c12
        description: >
          Flux C12 (description contractuelle des PRM C2-C4, >36 kVA), un document par ligne.
          Le XML est converti en dict par `etl/parsing/xml.xml_vers_dict` avant landing.
          Contient les puissances souscrites par classe temporelle TURPE, l'option tarifaire,
          l'utilisateur réseau (Personne_Morale avec Raison_Sociale et Code_APE).
        columns:
          - name: content
            description: Document JSON intégral (En_Tete_Flux + Contrat + PRM[]).
          - name: file_name
            description: Nom du fichier source (traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt).
      - name: raw_affaires
        description: >
          Flux X12 + X13 (suivi des affaires SGE), un document XML→dict par ligne.
          Source partagée par les deux flux (même schéma) ; l'origine (X12=initiee,
          X13=recue) se dérive de file_name dans flux_affaires.
        columns:
          - name: content
            description: Document JSON intégral (enteteFlux + affaire[]).
          - name: file_name
            description: Nom du fichier source (origine X12/X13 + traçabilité).
          - name: modification_date
            description: Date de modification SFTP (clé d'incrémental dlt + dédup jalons).
