version: 2

models:
  - name: flux_r64
    description: >
      Relevés R64 linéarisés au format wide : une ligne par (PDL, date de relevé),
      un index par cadran distributeur. Parité golden vérifiée
      (tests/ingestion/test_dbt_r64_golden.py).
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: date_releve
        description: Date du relevé.
        data_tests: [not_null]
      - name: releve_id
        description: Clé métier déterministe (ADR-0028) source|pdl|date|type_releve.
        data_tests: [not_null, unique]
      - name: nature_index
        description: Nature canonique (réel/estimé/corrigé), dérivée d'etapeMetier.
        data_tests: [not_null]

  - name: flux_c15
    description: >
      Situation contractuelle C15 : une ligne par PRM, relevés avant/après pivotés
      en colonnes index_{cadran}_kwh. Parité golden vérifiée
      (tests/ingestion/test_dbt_c15_golden.py).
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: date_evenement
        description: Horodatage de l'événement déclencheur (instant, TIMESTAMPTZ).
        data_tests: [not_null]
      - name: niveau_ouverture_services
        description: >
          Statut de communication (épique #313) : niveau d'ouverture aux services
          Enedis (xsd:string ∈ {0,1,2}), porté au niveau PRM. Communicant ⇔ niveau ≥ 1.
      - name: date_changement_niveau_ouverture_services
        description: Date de bascule du niveau d'ouverture aux services (xsd:date).

  - name: flux_r15
    description: >
      Relevés R15 : une ligne par RELEVÉ (un PRM peut en porter plusieurs à des dates
      différentes), index distributeur par cadran (Classe_Mesure=1/Sens=0). Parité
      golden (tests/ingestion/test_dbt_flux_golden.py) et parité totale legacy-vs-dbt sur
      données réelles.
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: date_releve
        description: Horodatage du relevé (instant, TIMESTAMPTZ).
        data_tests: [not_null]
      - name: releve_id
        description: Clé métier déterministe (ADR-0028) source|pdl|date|ordre_index.
        data_tests: [not_null]
      - name: id_releve
        description: Id_Releve Enedis natif (provenance, présent pour R15).
        data_tests: [not_null]
      - name: nature_index
        description: Nature canonique (réel/estimé), projetée depuis Nature_Index.
        data_tests: [not_null]

  - name: flux_r15_acc
    description: >
      Relevés R15 autoconsommation : une ligne par RELEVÉ, énergies ea_* par cadran
      (Classe_Mesure 3-6). Parité golden (cas réel vide, edge-case forgé peuplé).
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: date_releve
        description: Horodatage du relevé (instant, TIMESTAMPTZ).
        data_tests: [not_null]

  - name: flux_r151
    description: >
      Index périodiques R151 : une ligne par RELEVÉ (jusqu'à 20 relevés par PRM
      observés dans un même fichier), 4 cadrans saisonniers (+ INCONNU éventuel).
      date_releve = instant minuit Paris du jour J+1 (le +1j natif, ADR-0042).
      Parité golden et parité totale sur données réelles.
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: date_releve
        description: >
          Instant du relevé (TIMESTAMPTZ) : minuit Paris du jour J+1 — la conversion
          « fin de journée → début de journée » native de R151 (ADR-0042). releve_id
          reste minté sur la date brute.
        data_tests: [not_null]
      - name: releve_id
        description: Clé métier déterministe (ADR-0028) source|pdl|date|ordre_index.
        data_tests: [not_null]
      - name: nature_index
        description: Nature canonique 'réel' (télérelevé périodique).
        data_tests: [not_null]

  - name: flux_f12_detail
    description: >
      Détail valorisé F12 (facturation distributeur) : une ligne par Element_Valorise.
      Parité golden.
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: id_ev
        description: Identifiant de l'élément de valorisation.
        data_tests: [not_null]

  - name: flux_f15_detail
    description: >
      Détail facturé F15 (montants signés) : une ligne par Element_Valorise.
      Parité golden.
    columns:
      - name: pdl
        description: Point de livraison (14 chiffres).
        data_tests: [not_null]
      - name: id_ev
        description: Identifiant de l'élément de valorisation.
        data_tests: [not_null]

  - name: flux_affaires
    description: >
      Affaires SGE (X12 + X13) linéarisées : une ligne par (affaire, jalon
      d'avancement), dédupliquée sur la clé logique (affaire_id, jalon_num) — les flux
      quotidiens sont des snapshots cumulatifs (ADR-0028). Parité golden.
    columns:
      - name: affaire_id
        description: Identifiant Enedis de l'affaire (== Id_Affaire des événements C15).
        data_tests: [not_null]
      - name: affaire_jalon_id
        description: Clé logique du grain (affaire_id#jalon_num).
        data_tests: [not_null, unique]
      - name: origine
        description: initiee (X12, on initie) / recue (X13, autre acteur).
        data_tests: [not_null]
      - name: statut
        description: >
          Cycle de vie grossier COURS / TERMN / ANNUL. NULLABLE (#296) : Enedis envoie
          un <statut> vide pour une affaire fraîchement initiée qu'il n'a pas encore
          rangée (jalon 0, demande transmise) → null, ingéré fidèlement (ADR-0029).
      - name: jalon_num
        description: Numéro d'ordre du jalon dans l'affaire.
        data_tests: [not_null]
      - name: jalon_date_heure
        description: Horodatage de création du jalon (instant, TIMESTAMPTZ).
        data_tests: [not_null]
      - name: affaire_etat
        description: État fin de l'affaire au jalon (DMTR, DMREC, CPRE, CPNR…).
        data_tests: [not_null]
