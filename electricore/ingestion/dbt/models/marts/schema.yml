version: 2

models:
  - name: releves
    description: >
      Modèle de relevés canonique (ADR-0029) — union des sources périodiques
      harmonisées (R151 J+1, R64), dedup même-source par clé métier. Entrée de la
      chronologie au cœur (arbitrage de priorité + bornes côté cœur).
    columns:
      - name: releve_id
        description: >
          Clé métier déterministe (ADR-0028) source|pdl|date|discriminant. Unique
          dans le modèle canonique — le dedup même-source collapse les re-livraisons.
        data_tests: [not_null, unique]
      - name: source
        description: Source du relevé — énumération fermée (assemblage par adapters, #304).
        data_tests:
          - not_null
          - accepted_values:
              values: ["flux_C15", "flux_R64", "flux_R151"]
      - name: pdl
        description: Point de livraison ; non-null pour toute source (contrat, #304).
        data_tests: [not_null]
      - name: date_releve
        description: Date du relevé harmonisée (début de journée, Europe/Paris).
        data_tests: [not_null]
      - name: ordre_index
        description: Discriminant avant/après (False = avant / relevé périodique).
        data_tests: [not_null]

  - name: spine_contrat
    description: >
      Spine de la *Chronologie du contrat* (ADR-0041) — substrat relationnel (Class-Table
      Inheritance) : une ligne par fait d'une RSC (événements C15 ∪ grille FACTURATION
      mensuelle), épine commune + situation forward-fillée en SQL sur la timeline
      d'événements complète. L'horizon reste un FILTRE côté cœur (grille pré-générée
      jusqu'à `borne_facturation_genereuse`). Parité vs `pipeline_historique` vérifiée
      (tests/ingestion/test_dbt_spine_contrat.py).
    columns:
      - name: ref_situation_contractuelle
        description: Situation contractuelle (RSC) — clé de partition du forward-fill.
        data_tests: [not_null]
      - name: pdl
        description: Point de livraison.
        data_tests: [not_null]
      - name: date_evenement
        description: Horodatage du fait (instant, Europe/Paris) — ordre du forward-fill.
        data_tests: [not_null]
      - name: source
        description: Source du fait — énumération fermée (s'étendra avec les relations).
        data_tests:
          - not_null
          - accepted_values:
              values: ["flux_C15", "synthese_mensuelle"]
      - name: type_fait
        description: Sous-type de la spine (Class-Table Inheritance).
        data_tests:
          - not_null
          - accepted_values:
              values: ["evenement", "facturation"]

  - name: chronologie_releves_situation
    description: >
      Chronologie des relevés — MART MINCE (ADR-0041, normalisé ADR-0045) : projection
      ÉNERGIE de la spine, SANS le payload d'index. Relevés C15 aux événements impactant
      l'énergie + bornes FACTURATION appariées aux périodiques (R151/R64) au grain JOUR
      (equi-join, remplace l'asof 4h du cœur), dédoublonnées par priorité C15>R64>R151.
      Porte l'identité + la situation (FTA/niveau/RSC) + `releve_id` (référence) + les
      attributs de slot (ordre_index, source, releve_manquant). Grain : 1 ligne par
      (rsc, date_releve, ordre_index).
    columns:
      - name: ref_situation_contractuelle
        description: Situation contractuelle (RSC) — attribuée nativement (C15) ou par la spine (périodiques).
        data_tests: [not_null]
      - name: date_releve
        description: Date du relevé / borne (instant, Europe/Paris).
        data_tests: [not_null]
      - name: ordre_index
        description: Discriminant avant/après (False = avant / relevé périodique).
        data_tests: [not_null]
      - name: source
        description: >
          Source gagnante (priorité C15>R64>R151). NULLABLE : une borne FACTURATION sans
          relevé apparié (releve_manquant) n'a pas de source.
        data_tests:
          - accepted_values:
              values: ["flux_C15", "flux_R64", "flux_R151"]

  - name: chronologie_releves
    description: >
      Chronologie des relevés — VUE (ADR-0045) : star-join `chronologie_releves_situation ⨝
      releves ON releve_id` qui ré-attache le payload d'index (index_*/nature_index/
      id_calendrier_distributeur), faisant de `releves` la source de vérité unique
      (ADR-0029/0038). Modèle consommé par le cœur (loader `chronologie_releves()`) ; contrat
      `ChronologieReleves` inchangé. Grain `(rsc, date_releve, ordre_index)` préservé : left
      join 1:1 (`releve_id` unique dans `releves`) — garanti par le test singulier de grain
      `assert_chronologie_releves_grain_unique`. L'intégrité référentielle `releve_id ⊆
      releves` + la parité du payload sont vérifiées côté Python (test_dbt_chronologie_releves
      `test_index_proviennent_de_releves`) : un test dbt `relationships` ici serait tiré
      (sélection indirecte « eager ») dans tout build partiel `+releves` (runner prod, golden
      releves) où la vue n'est pas matérialisée → on s'en remet à la parité Python.
    columns:
      - name: releve_id
        description: >
          Référence (clé métier ADR-0028) vers `releves` — la relation par laquelle le payload
          d'index est ré-attaché. NULLABLE : une borne sans relevé apparié (releve_manquant)
          ne référence rien (payload nul).

  - name: audit_sequences
    description: >
      Audit de séquences Enedis (#645, PRD #644) — VUE, une ligne par anomalie détectée :
      trou de séquence, queue invérifiable, nom de zip non reconnu (macro `audit_sequences`,
      brique commune réutilisée par le relais de flux #646) + intra-zip incomplet (contrôle
      spécifique ingestion, R151 en inter-zips). Publications ponctuelles R64/R67 hors champ
      (séquence toujours figée à 00001). Voir docs/ingestion.md pour la requête de
      consultation et les limites (trous « à vérifier », queue jamais saine).
    data_tests:
      - aucune_anomalie:
          config:
            severity: warn
    columns:
      - name: flux
        description: Code flux Enedis de l'anomalie (C15, R15, F15, F12, R151, C12, X12, X13).
        data_tests: [not_null]
      - name: cle_sequence
        description: >
          Clé de séquence (préfixée du flux) — NULLABLE : absente pour `nom_non_reconnu`
          (le nom n'a pas pu être décomposé) et `intra_zip_incomplet` (anomalie par zip, pas
          par clé de séquence).
      - name: type_anomalie
        description: Classification — trou / queue_inverifiable / nom_non_reconnu / intra_zip_incomplet.
        data_tests:
          - not_null
          - accepted_values:
              values: ["trou", "queue_inverifiable", "nom_non_reconnu", "intra_zip_incomplet"]
      - name: seq_ou_plage
        description: >
          Numéro(s) ou zip concerné(s) — un numéro seul ("00003"), une plage ("00003-00005"),
          un nom de zip non reconnu, ou un décompte intra-zip ("<zip> (2/3)").
        data_tests: [not_null]
