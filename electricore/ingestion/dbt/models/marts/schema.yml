version: 2

models:
  - name: releves
    description: >
      Modèle de relevés canonique (ADR-0029) — union des sources périodiques
      harmonisées (R151 J+1, R64), dedup même-source par clé métier. Entrée de la
      chronologie au cœur (arbitrage de priorité + bornes côté cœur).
    columns:
      - name: releve_id
        description: >
          Clé métier déterministe (ADR-0028) source|pdl|date|discriminant. Unique
          dans le modèle canonique — le dedup même-source collapse les re-livraisons.
        data_tests: [not_null, unique]
      - name: source
        description: Source du relevé — énumération fermée (assemblage par adapters, #304).
        data_tests:
          - not_null
          - accepted_values:
              values: ["flux_C15", "flux_R64", "flux_R151"]
      - name: pdl
        description: Point de livraison ; non-null pour toute source (contrat, #304).
        data_tests: [not_null]
      - name: date_releve
        description: Date du relevé harmonisée (début de journée, Europe/Paris).
        data_tests: [not_null]
      - name: ordre_index
        description: Discriminant avant/après (False = avant / relevé périodique).
        data_tests: [not_null]

  - name: spine_contrat
    description: >
      Spine de la *Chronologie du contrat* (ADR-0041) — substrat relationnel (Class-Table
      Inheritance) : une ligne par fait d'une RSC (événements C15 ∪ grille FACTURATION
      mensuelle), épine commune + situation forward-fillée en SQL sur la timeline
      d'événements complète. L'horizon reste un FILTRE côté cœur (grille pré-générée
      jusqu'à `borne_facturation_genereuse`). Parité vs `pipeline_historique` vérifiée
      (tests/ingestion/test_dbt_spine_contrat.py).
    columns:
      - name: ref_situation_contractuelle
        description: Situation contractuelle (RSC) — clé de partition du forward-fill.
        data_tests: [not_null]
      - name: pdl
        description: Point de livraison.
        data_tests: [not_null]
      - name: date_evenement
        description: Horodatage du fait (instant, Europe/Paris) — ordre du forward-fill.
        data_tests: [not_null]
      - name: source
        description: Source du fait — énumération fermée (s'étendra avec les relations).
        data_tests:
          - not_null
          - accepted_values:
              values: ["flux_C15", "synthese_mensuelle"]
      - name: type_fait
        description: Sous-type de la spine (Class-Table Inheritance).
        data_tests:
          - not_null
          - accepted_values:
              values: ["evenement", "facturation"]

  - name: chronologie_releves
    description: >
      Chronologie des relevés (ADR-0041) — projection ÉNERGIE de la spine : relevés C15
      aux événements impactant l'énergie + bornes FACTURATION appariées aux périodiques
      (R151/R64) au grain JOUR (equi-join, remplace l'asof 4h du cœur), dédoublonnées par
      priorité C15>R64>R151. Grain : 1 ligne par (rsc, date_releve, ordre_index). Parité vs
      `_assembler_chronologie` vérifiée (tests/ingestion/test_dbt_chronologie_releves.py).
    columns:
      - name: ref_situation_contractuelle
        description: Situation contractuelle (RSC) — attribuée nativement (C15) ou par la spine (périodiques).
        data_tests: [not_null]
      - name: date_releve
        description: Date du relevé / borne (instant, Europe/Paris).
        data_tests: [not_null]
      - name: ordre_index
        description: Discriminant avant/après (False = avant / relevé périodique).
        data_tests: [not_null]
      - name: source
        description: >
          Source gagnante (priorité C15>R64>R151). NULLABLE : une borne FACTURATION sans
          relevé apparié (releve_manquant) n'a pas de source.
        data_tests:
          - accepted_values:
              values: ["flux_C15", "flux_R64", "flux_R151"]
