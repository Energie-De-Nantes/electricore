name: electricore_flux
version: "1.0.0"
config-version: 2

# Profil défini dans profiles.yml du même dossier (passer --profiles-dir).
profile: electricore_flux

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  electricore_flux:
    staging:
      # Vues : le cast JSON→struct est gratuit, pas besoin de matérialiser.
      +materialized: view
    flux:
      # Tables : les flux linéarisés sont les tables consommées par core/.
      +materialized: table
    intermediate:
      # Vues : adapters de source (ex. int_releves__c15) consommés par les marts ;
      # testables et inspectables, coût ~nul (ADR-0029, #304).
      +materialized: view
    marts:
      # Tables : modèles transverses (cross-flux) consommés par core/ (ADR-0029).
      +materialized: table

# Vocabulaire des cadrans temporels (ADR-0035 §1) : SOURCE UNIQUE = core/models/cadrans.py.
# Injecté ici pour la macro `pivot_cadrans` (fan-out `index_*_kwh`). La cohérence avec
# `CADRANS` (Python) est prouvée par tests/ingestion/test_cadrans_source_unique.py — la
# liste cesse d'être recopiée à la main dans chaque modèle de linéarisation.
vars:
  cadrans_releve: [base, hp, hc, hph, hch, hpb, hcb]
