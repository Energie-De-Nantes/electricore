# Configuration de MOUVEMENT des flux Enedis (ADR-0020).
#
# Ce fichier ne décrit plus que ce que la chaîne de mouvement doit savoir :
# où trouver les zips (file_pattern, glob SFTP), quels fichiers en extraire
# (file_regex) et leur format (xml/json). La sélection, le pivot et le typage
# vivent dans les modèles dbt (electricore/ingestion/dbt/models/) — l'ex-DSL de
# linéarisation (row_level/data_fields/nested_fields) a été retiré avec le
# parseur legacy (#138).

C15:
  file_pattern: "**/*_C15_*.zip"
  format: xml
  file_regex: "*_C15_*.xml"

F12:
  file_pattern: "**/*_F12_*.zip"
  format: xml
  file_regex: "*.xml"

F15:
  file_pattern: "**/*_F15_*.zip"
  format: xml
  file_regex: "*.xml"

R15:
  file_pattern: "**/*_R15_*.zip"
  format: xml
  file_regex: "*.xml"

R151:
  file_pattern: "**/*_R151_*.zip"
  format: xml
  file_regex: "*.xml"

R64:
  file_pattern: "**/R63_R64_R65_R66_R67_C68/*_R64_*.zip"
  format: json
  file_regex: "*.JSON"  # JSON en majuscules dans les ZIPs R64

# R67 (« mesures facturantes ») : énergie facturante par période, à la demande (prestation
# M023, ADR-0047). Même répertoire SFTP que R64, mais JSON minuscules dans les ZIPs R67.
# incremental: false → re-liste TOUT à chaque run. Flux ponctuel et peu volumineux : un
# fichier qui n'atterrit pas (decrypt/parse → 0 document) doit pouvoir se rejouer au run
# suivant ; le merge `file_name` dédoublonne. Évite le « curseur bloqué » qui sautait à
# jamais les M023 du jour (le listing avançait sans landing).
R67:
  file_pattern: "**/R63_R64_R65_R66_R67_C68/*_R67_*.zip"
  format: json
  file_regex: "*.json"  # JSON en minuscules dans les ZIPs R67
  incremental: false


C12:
  file_pattern: "**/*_C12_*.zip"
  format: xml
  file_regex: "*_C12_*.xml"

# X12 (affaires initiées par l'instance) + X13 (affaires reçues d'autres acteurs)
# partagent le même schéma XSD → une seule table brute `raw_affaires` ; l'origine se
# dérive du nom de fichier dans le modèle dbt. Le glob `[23]` capture X12 et X13 sans
# attraper X14/X15 (réclamations).
AFFAIRES:
  file_pattern: "**/*_X1[23]_*.zip"
  format: xml
  file_regex: "*_X1[23]_*.xml"
