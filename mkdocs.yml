site_name: ElectriCore
site_url: https://energie-de-nantes.github.io/electricore/
theme:
  name: material
  palette:
    # `custom` = les couleurs viennent des variables --md-* de stylesheets/cozy.css
    # (palette « Warm Cosy » des schémas Excalidraw, scripts/cozy_palettes.json).
    scheme: default
    primary: custom
    accent: custom

extra_css:
  - stylesheets/cozy.css

plugins:
  - search

hooks:
  - scripts/mkdocs_hooks.py

# validation.links n'a pas de niveau `error` dans cette version de MkDocs (seulement
# warn/info/ignore) : `warn` est le niveau le plus strict disponible, et c'est bien
# `mkdocs build --strict` (garde-fou CI, #560) qui transforme un warning en échec.
# `not_found` (lien interne mort) est donc désormais bloquant partout SAUF dans
# docs/adr/** et docs/agents/** (registres figés, cf. scripts/mkdocs_hooks.py) : ces
# deux répertoires portent ~55 liens vers du code/des fichiers hors docs/ (légitimes,
# mais non résolvables par MkDocs) ou, pour deux ADRs, une coquille de nommage vers un
# autre ADR — corriger le contenu d'un ADR publié est un interdit dur (#560), même pour
# un lien.
validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn

exclude_docs: "*.excalidraw"

nav:
  - Accueil: index.md
  - Comprendre:
      - comprendre/index.md
      - Le système électrique français: comprendre/systeme-electrique.md
      - Le compteur et le PDL: comprendre/compteur-pdl.md
      - L'anatomie d'une facture: comprendre/anatomie-facture.md
      - Pourquoi recalculer soi-même: comprendre/pourquoi-recalculer.md
      - ElectriCore vu de loin: comprendre/electricore-vu-de-loin.md
  - Facturer:
      - facturiste/index.md
      - Ce qui a changé: facturiste/changelog-facturiste.md
      - Bot Telegram (facturiste): guide-bot-facturiste.md
      - Notebook opérateur: operateur-notebook.md
  - Déployer:
      - deployer/index.md
      - Déploiement VPS: deploiement.md
  - Contribuer:
      - contribuer/index.md
      - Charte de la documentation: contribuer/charte-documentation.md
      - Carte des domaines: contribuer/carte-domaines.md
      - Développer: contribuer/developper.md
      - Query builder Odoo: odoo-query-builder.md
      - Contrats d'intégration:
          - Méta-périodes: contrat-meta-periodes.md
          - Prestations F15: contrat-prestations.md
          - Résolution RSC: contrat-rsc.md
          - TURPE variable: contrat-turpe-variable.md
  - Maintenir:
      - maintenir/index.md
      - Index thématique des ADRs: maintenir/index-adr.md
      - Processus de release: maintenir/release.md
      - Gouvernance du registre réglementaire: maintenir/gouvernance-reglementaire.md
