site_name: ElectriCore
site_url: https://energie-de-nantes.github.io/electricore/
theme:
  name: material

plugins:
  - search

validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: ignore
    unrecognized_links: ignore

exclude_docs: "*.excalidraw"

nav:
  - Accueil: index.md
  - Comprendre:
      - comprendre/index.md
      - Le système électrique français: comprendre/systeme-electrique.md
      - Le compteur et le PDL: comprendre/compteur-pdl.md
      - L'anatomie d'une facture: comprendre/anatomie-facture.md
      - Pourquoi recalculer soi-même: comprendre/pourquoi-recalculer.md
      - ElectriCore vu de loin: comprendre/electricore-vu-de-loin.md
  - Facturer:
      - Guide facturiste: facturiste/changelog-facturiste.md
      - Bot Telegram (facturiste): guide-bot-facturiste.md
      - Notebook opérateur: operateur-notebook.md
  - Déployer:
      - deployer/index.md
  - Contribuer:
      - contribuer/index.md
      - Charte de la documentation: contribuer/charte-documentation.md
      - Carte des domaines: contribuer/carte-domaines.md
      - Développer: contribuer/developper.md
  - Maintenir:
      - maintenir/index.md
      - Index thématique des ADRs: maintenir/index-adr.md
      - Processus de release: maintenir/release.md
      - Gouvernance du registre réglementaire: maintenir/gouvernance-reglementaire.md
