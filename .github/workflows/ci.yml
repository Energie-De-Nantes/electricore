name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Jeton en lecture seule : les jobs ne font que checkout + lint/mypy/pytest,
# aucune écriture (commits, releases, comments…) n'est nécessaire.
permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - name: Install dependencies (locked)
        run: uv sync --locked --extra ingestion --group typecheck
      - name: Run mypy
        run: uv run --group typecheck mypy

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        # --extra dbt : active le filet d'ingestion (golden dbt + fixtures XSD) —
        # sans lui, les tests dbt sont skippés (importorskip).
        run: uv sync --locked --extra ingestion --extra dbt --group test --group docs

      # sops + age : binaires statiques pinnés (mêmes versions que l'image, cf.
      # deploy/docker/Dockerfile) pour que le test de déchiffrement à l'entrypoint
      # (ADR-0044, tests/integration/test_entrypoint_dechiffrement.py) tourne pour
      # de VRAI en CI au lieu de se skipper.
      - name: Installer sops + age (déchiffrement secrets, ADR-0044)
        run: |
          set -euo pipefail
          SOPS_VERSION=3.9.4
          SOPS_SHA256=5488e32bc471de7982ad895dd054bbab3ab91c417a118426134551e9626e4e85
          AGE_VERSION=1.2.1
          AGE_SHA256=7df45a6cc87d4da11cc03a539a7470c15b1041ab2b396af088fe9990f7c79d50
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          echo "${SOPS_SHA256}  /tmp/sops" | sha256sum -c -
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -fsSL -o /tmp/age.tgz "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz"
          echo "${AGE_SHA256}  /tmp/age.tgz" | sha256sum -c -
          tar -xzf /tmp/age.tgz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age
          sudo install -m 0755 /tmp/age/age-keygen /usr/local/bin/age-keygen
          sops --version
          age --version

      - name: Run tests
        run: uv run --group test pytest

  test-client:
    name: test-client (isolé, polars-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      # Environnement ISOLÉ : uniquement electricore-client (httpx + pydantic) +
      # pytest. PAS le moteur, PAS polars — la garantie polars-free devient un
      # gate de CI (le test de pureté du paquet le prouve dans ce même venv).
      - name: Créer un venv isolé pour le client
        run: uv venv /tmp/client-venv

      - name: Installer electricore-client seul (base, sans [arrow])
        run: |
          uv pip install --python /tmp/client-venv ./packages/electricore-client pytest

      - name: Garde-fou — polars/duckdb/fastapi ABSENTS de l'environnement
        run: |
          uv pip list --python /tmp/client-venv | tee /tmp/pkgs.txt
          if grep -iqE '^(polars|duckdb|fastapi)[[:space:]]' /tmp/pkgs.txt; then
            echo "::error::Un module lourd (polars/duckdb/fastapi) a fuité dans l'env client isolé."
            exit 1
          fi

      - name: Lancer les tests du client (les tests Arrow se skippent sans polars)
        run: |
          /tmp/client-venv/bin/python -m pytest packages/electricore-client/tests -q

  deploy-tests:
    name: deploy shell tests (bash, fake-binaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Couvre les helpers deploy/lib/ + deploy/docker/smoke.sh (secrets-as-code,
      # ADR-0044 ; smoke d'image, #435). Bash pur, fake-binaires docker/git/sops,
      # zéro dépendance → ces logiques d'infra étaient jusqu'ici hors-CI.
      - name: Run deploy unit tests
        run: bash deploy/tests/unit.sh

      # sops + age : mêmes versions pinnées que le job `test` (déchiffrement image) et
      # que deploy/lib/secrets.sh (SOPS_VERSION/AGE_VERSION) pour l'aller-retour crypto
      # réel de l'onboarding (secrets_roundtrip.sh, anti-régression #453).
      - name: Installer sops + age (aller-retour crypto onboarding, #453)
        run: |
          set -euo pipefail
          SOPS_VERSION=3.9.4
          SOPS_SHA256=5488e32bc471de7982ad895dd054bbab3ab91c417a118426134551e9626e4e85
          AGE_VERSION=1.2.1
          AGE_SHA256=7df45a6cc87d4da11cc03a539a7470c15b1041ab2b396af088fe9990f7c79d50
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          echo "${SOPS_SHA256}  /tmp/sops" | sha256sum -c -
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -fsSL -o /tmp/age.tgz "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz"
          echo "${AGE_SHA256}  /tmp/age.tgz" | sha256sum -c -
          tar -xzf /tmp/age.tgz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age
          sudo install -m 0755 /tmp/age/age-keygen /usr/local/bin/age-keygen
          sops --version
          age --version
      - name: Run secrets onboarding round-trip (#453)
        run: bash deploy/tests/secrets_roundtrip.sh

  # Build + scan + smoke de l'image Docker sur CHAQUE PR (#435) — via le workflow
  # réutilisable partagé avec release.yml. `push` reste à false : seul release.yml pousse.
  docker-image:
    name: docker image (build + smoke)
    permissions:
      contents: read
    uses: ./.github/workflows/docker-image.yml
