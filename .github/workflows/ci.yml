name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Jeton en lecture seule : les jobs ne font que checkout + lint/mypy/pytest,
# aucune écriture (commits, releases, comments…) n'est nécessaire.
permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - name: Install dependencies (locked)
        run: uv sync --locked --extra ingestion --group typecheck
      - name: Run mypy
        run: uv run --group typecheck mypy

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        # --extra dbt : active le filet d'ingestion (golden dbt + fixtures XSD) —
        # sans lui, les tests dbt sont skippés (importorskip).
        run: uv sync --locked --extra ingestion --extra dbt --group test

      - name: Run tests
        run: uv run --group test pytest
