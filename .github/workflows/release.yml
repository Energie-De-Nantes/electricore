name: Release

on:
  push:
    tags:
      # Stable : v1.7.0
      - 'v[0-9]+.[0-9]+.[0-9]+'
      # Pre-release PEP 440 : v1.7.0a1, v1.7.0b1, v1.7.0rc1, v1.7.0.dev1
      - 'v[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+b[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'

# Pas de bloc concurrency : un release ne doit jamais être annulé en cours de publication.

permissions:
  contents: write   # gh release create
  id-token: write   # OIDC pour PyPI trusted publishing
  packages: write   # push image Docker sur ghcr.io

jobs:
  release:
    name: Build, publish to PyPI, create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet pour les notes de release)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect pre-release
        id: release_type
        run: |
          # Un tag stable matche vX.Y.Z strictement ; tout autre format
          # (rc, dev, alpha, beta — voir le bloc `on.push.tags`) est une pré-release.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Vérifier que les artefacts correspondent au tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ls dist/electricore-${TAG}.tar.gz dist/electricore-${TAG}-py3-none-any.whl

      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            dist/*.tar.gz dist/*.whl

  # ---------------------------------------------------------------
  # Image Docker → ghcr.io (en parallèle de la publication PyPI)
  #
  # Le gate « build → scan → smoke → push » vit désormais dans le workflow
  # réutilisable docker-image.yml (#435), partagé avec ci.yml — qui le fait
  # tourner sur CHAQUE PR (push=false). Ici on calcule les tags du release puis
  # on appelle ce même workflow avec push=true.
  # ---------------------------------------------------------------
  docker_meta:
    name: Compute Docker tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.compute.outputs.tags }}
    steps:
      - name: Compute tags (pré-release ne touche ni :latest ni :MAJOR.MINOR)
        id: compute
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          V="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${V%.*}"
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Stable : :latest + :MAJOR.MINOR + :version exacte.
            TAGS="ghcr.io/${OWNER}/electricore:${V},ghcr.io/${OWNER}/electricore:${MAJOR_MINOR},ghcr.io/${OWNER}/electricore:latest"
          else
            # Pré-release : seulement :version exacte (ne pas rediriger les déploiements
            # stables vers la rc/dev).
            TAGS="ghcr.io/${OWNER}/electricore:${V}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

  image:
    name: Build, scan, smoke & push image
    needs: docker_meta
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-image.yml
    with:
      push: true
      push_tags: ${{ needs.docker_meta.outputs.tags }}
